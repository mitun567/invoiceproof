version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: invoiceproof_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoiceproof
      POSTGRES_PASSWORD: invoiceproof
      POSTGRES_DB: invoiceproof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: invoiceproof_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
